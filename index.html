<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KR Market Command Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<style>
:root{--bg:#0e1420;--panel:#161e2e;--panel-2:#1c2739;--line:#26324a;--ink:#e7edf7;--ink-dim:#9aa8c0;--ink-mute:#66748f;
--accent:#4aa3c7;--red:#e5484d;--red-bg:rgba(229,72,77,.14);--green:#30a46c;--green-bg:rgba(48,164,108,.14);
--amber:#e0a020;--amber-bg:rgba(224,160,32,.14);--neutral:#8291ab;--neutral-bg:rgba(130,145,171,.14);
--shadow:0 1px 0 rgba(255,255,255,.02),0 8px 24px rgba(0,0,0,.28);
--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo",sans-serif;--r:12px}
@media(prefers-color-scheme:light){:root{--bg:#eef1f6;--panel:#fff;--panel-2:#f5f7fb;--line:#dde3ee;--ink:#1a2438;--ink-dim:#4a5878;--ink-mute:#8592ab;--accent:#1f7d9c;
--red-bg:rgba(229,72,77,.1);--green-bg:rgba(48,164,108,.1);--amber-bg:rgba(224,160,32,.12);--neutral-bg:rgba(130,145,171,.12);--shadow:0 1px 2px rgba(20,30,60,.06),0 6px 18px rgba(20,30,60,.07)}}
:root[data-theme="light"]{--bg:#eef1f6;--panel:#fff;--panel-2:#f5f7fb;--line:#dde3ee;--ink:#1a2438;--ink-dim:#4a5878;--ink-mute:#8592ab;--accent:#1f7d9c;
--red-bg:rgba(229,72,77,.1);--green-bg:rgba(48,164,108,.1);--amber-bg:rgba(224,160,32,.12);--neutral-bg:rgba(130,145,171,.12)}
:root[data-theme="dark"]{--bg:#0e1420;--panel:#161e2e;--panel-2:#1c2739;--line:#26324a;--ink:#e7edf7;--ink-dim:#9aa8c0;--ink-mute:#66748f;--accent:#4aa3c7}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:15px}
.wrap{max-width:1180px;margin:0 auto;padding:18px 20px 52px}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.lbl{font-size:10.5px;font-weight:650;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
h1,h2{margin:0;font-weight:680;letter-spacing:-.01em}
.mast{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.mast .title{display:flex;align-items:baseline;gap:12px}.mast h1{font-size:19px}.mast .flag{font-size:19px}.mast .sub{color:var(--ink-mute);font-size:12px}
.updated{font-size:11.5px;color:var(--ink-mute);display:flex;align-items:center;gap:10px}.updated b{color:var(--ink-dim);font-weight:600}
.dmode{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.dmode::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.dmode.live{color:var(--green);background:var(--green-bg)}.dmode.partial{color:var(--amber);background:var(--amber-bg)}.dmode.demo{color:var(--red);background:var(--red-bg)}
.dm-reason{font-size:10px;color:var(--amber);font-family:var(--mono);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
/* status — 상단 압축 */
.status{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.status::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--sc,var(--red))}
.status-grid{display:grid;grid-template-columns:minmax(220px,1.05fr) 2fr}@media(max-width:720px){.status-grid{grid-template-columns:1fr}}
.status-hero{padding:14px 22px;border-right:1px solid var(--line)}@media(max-width:720px){.status-hero{border-right:0;border-bottom:1px solid var(--line)}}
.status-hero .stance{display:flex;align-items:center;gap:10px;margin:5px 0 2px}
.status-hero .stance .dot{width:10px;height:10px;border-radius:50%;background:var(--sc,var(--red));box-shadow:0 0 0 4px var(--red-bg)}
.status-hero .stance b{font-size:24px;font-weight:720;letter-spacing:-.02em}.status-hero .verdict{color:var(--sc,var(--red));font-weight:600;font-size:13px}
.status-meta{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.smeta{background:var(--panel);padding:10px 18px;display:flex;flex-direction:column;gap:2px}.smeta .v{font-size:14.5px;font-weight:620;font-family:var(--mono)}.smeta .v .fail{color:var(--red)}
section{margin-top:18px}.sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.sec-head .n{font-family:var(--mono);color:var(--accent);font-size:12px;font-weight:600}.sec-head h2{font-size:15px}.sec-head .note{margin-left:auto;font-size:11.5px;color:var(--ink-mute)}
.help-ic{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--line);color:var(--ink-mute);font-size:11px;font-weight:700;cursor:pointer;user-select:none}.help-ic:hover{color:var(--accent);border-color:var(--accent)}
.legend-box{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12px;color:var(--ink-dim)}
.legend-box .lg-h{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);font-weight:650;margin-bottom:8px}
.legend-box .lg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:640px){.legend-box .lg-grid{grid-template-columns:1fr}}
.legend-box .lg-grid>div>div{margin-top:5px;line-height:1.5}.legend-box b{color:var(--ink)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:860px){.grid4{grid-template-columns:repeat(2,1fr)}}@media(max-width:460px){.grid4{grid-template-columns:1fr}}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:860px){.two{grid-template-columns:1fr}}
/* index cards — 압축 + 1D 라벨 */
.idx{padding:12px 15px}.idx .top{display:flex;align-items:center;justify-content:space-between}.idx .nm{font-weight:640;font-size:14px}
.idx .chg{display:flex;align-items:baseline;gap:7px;margin:7px 0 2px}.idx .chg .tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--ink-mute);border:1px solid var(--line);padding:1px 5px;border-radius:5px}
.idx .chg .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:19px;font-weight:600}
.idx .rows{margin-top:8px;display:flex;flex-direction:column;gap:4px;font-size:12px}
.idx .rows .r{display:flex;justify-content:space-between;color:var(--ink-dim)}.idx .rows .r .num{color:var(--ink)}.neg{color:var(--red)}.pos{color:var(--green)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:660;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pill.red{color:var(--red);background:var(--red-bg)}.pill.green{color:var(--green);background:var(--green-bg)}.pill.amber{color:var(--amber);background:var(--amber-bg)}
.pill.neutral{color:var(--neutral);background:var(--neutral-bg)}.pill.accent{color:var(--accent);background:rgba(74,163,199,.14)}
.tag2{font-size:9px;letter-spacing:.05em;color:var(--ink-mute);text-transform:uppercase;font-weight:600;margin-left:6px}
/* recovery */
.rec{padding:15px 18px}
.rail{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));margin:4px 0 0}
.rail .stg{display:flex;flex-direction:column;align-items:center;position:relative;padding:0 2px}
.rail .stg .bar{height:4px;width:100%;background:var(--line);border-radius:2px}.rail .stg.done .bar{background:var(--accent)}
.rail .stg .rd{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:var(--panel);border:2px solid var(--line)}
.rail .stg.here .rd{background:var(--sc,var(--red));border-color:var(--sc,var(--red));box-shadow:0 0 0 4px var(--red-bg)}
.rail-lbls{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));margin-top:10px}
.rail-lbls span{text-align:center;font-size:9px;line-height:1.25;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-mute);padding:0 2px;word-break:keep-all}
.rail-lbls span.here{color:var(--sc,var(--red));font-weight:700}
.rec-split{display:grid;grid-template-columns:42% 58%;gap:16px;margin-top:16px}@media(max-width:560px){.rec-split{grid-template-columns:1fr}}
.subhead{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px;font-weight:650}
.comp{display:flex;flex-direction:column;gap:7px}.comp .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding-bottom:6px;border-bottom:1px dashed var(--line)}
.comp .row:last-child{border-bottom:0}.comp .row .k{color:var(--ink-dim);white-space:nowrap}.comp .row .val{font-family:var(--mono);font-weight:600;white-space:nowrap;text-align:right}
.need{display:flex;flex-direction:column;gap:8px}
.need .nrow{display:flex;flex-direction:column;gap:2px}
.need .nhead{display:flex;gap:8px;font-size:12.5px;color:var(--ink-dim);align-items:center}
.need .nhead .ndot{flex:none;width:6px;height:6px;border-radius:50%;background:var(--amber)}
.need .nhead .ntx{flex:1}.need .nrow.met .ntx{color:var(--ink-mute)}
.need .nhead .nst{flex:none;font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono)}
.need .ndetail{font-size:10.5px;color:var(--ink-mute);padding-left:14px;line-height:1.45}
/* breadth */
.brd{padding:15px 18px}table{width:100%;border-collapse:collapse}.brd td,.brd th{padding:7px 4px;text-align:right;border-bottom:1px solid var(--line);font-size:13px}
.brd th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);font-weight:650}.brd td:first-child,.brd th:first-child{text-align:left;color:var(--ink-dim)}
.brd tr:last-child td{border-bottom:0}.brd .cur{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600}.brd .d{font-family:var(--mono);font-size:12px}
.sparks{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);flex-wrap:wrap}.spark{flex:1;min-width:130px}
.spark .cap{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}.spark .cap .t{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);font-weight:600}
.spark .cap .now{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}.spark svg{display:block;width:100%;height:32px;overflow:visible}
.spark .stat{margin-top:4px;font-size:10px;color:var(--ink-mute);font-family:var(--mono);letter-spacing:.01em}
/* sector */
.sect{padding:0}.sect-sum{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px 13px;border-bottom:1px solid var(--line)}.sect-sum .rot{margin-left:auto}
/* #7 필터 칩 바 */
.sfilter{display:flex;gap:6px;flex-wrap:wrap;padding:9px 16px;border-bottom:1px solid var(--line);background:var(--panel-2)}
.fchip{font:inherit;font-size:11px;font-weight:600;color:var(--ink-dim);background:transparent;border:1px solid var(--line);border-radius:999px;padding:3px 10px;cursor:pointer;letter-spacing:.02em}
.fchip:hover{border-color:var(--accent);color:var(--ink)}.fchip.on{color:#fff;background:var(--accent);border-color:var(--accent)}
.fchip .fc{font-family:var(--mono);opacity:.75;font-size:10px}
/* #7 sticky 헤더가 동작하도록 자체 스크롤 컨테이너(세로 max-height, 가로 overflow) */
.sect-scroll{max-height:560px;overflow-y:auto;overflow-x:auto}
.hrow{display:grid;grid-template-columns:minmax(150px,1fr) 84px 150px 78px 200px;align-items:center;border-bottom:1px solid var(--line);font-size:12.5px}.hrow:last-child{border-bottom:0}
.tkr{margin-left:6px;font-family:var(--mono);font-size:10px;color:var(--ink-mute);font-weight:500}
.hrow .nm{padding:6px 16px;font-weight:600}.hrow .cell{padding:6px 8px;text-align:center;border-left:1px solid var(--line)}
.hrow.head{background:var(--panel-2);position:sticky;top:0;z-index:2}.hrow.head .cell,.hrow.head .nm{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);font-weight:650}
.hrow.head .cell{cursor:help}
.price-in{color:var(--green)}.price-out{color:var(--red)}.badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:650;text-transform:uppercase;margin-left:4px}
.badge.out{color:var(--red);background:var(--red-bg)}.badge.in{color:var(--green);background:var(--green-bg)}
.up{color:var(--green)}.dn{color:var(--red)}.status-cell{display:flex;flex-direction:column;gap:1px;align-items:center}
.chgbox{display:flex;gap:8px;flex-wrap:wrap;padding:11px 16px;border-top:1px solid var(--line);align-items:center}.chgbox .item{font-size:12px;color:var(--ink-dim);display:inline-flex;align-items:center;gap:6px}
/* next leaders — 3 zones */
.pipe{display:flex;align-items:center;padding:14px 18px 8px;flex-wrap:wrap}.pipe .st{display:flex;align-items:center;gap:8px}
.pipe .st .name{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:650;color:var(--ink-mute)}.pipe .st .cnt{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
.pipe .st.filled .name{color:var(--ink)}.pipe .arw{color:var(--line);margin:0 9px}.ready-tag{margin-left:auto}
.zone-h{padding:9px 18px 3px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;border-top:1px solid var(--line)}
.lead{padding:0 4px 6px}.lrow{display:grid;grid-template-columns:140px 110px 150px 1fr 118px;align-items:center;border-bottom:1px solid var(--line);font-size:12.5px}
.lrow:last-child{border-bottom:0}.lrow div{padding:10px 14px;min-width:0}.lrow .tk{font-weight:640}.lrow .gr,.lrow .why{color:var(--ink-dim);font-size:12px}
.lead .pill{white-space:normal;line-height:1.3;text-align:center}.lrow .why{padding-left:16px}
.lrow.head{background:var(--panel-2)}.lrow.head div{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);font-weight:650}
.lrow .nxt{padding:10px 14px;min-width:0}
.gap-tgt{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;margin-bottom:4px}
.gap-list{display:flex;flex-wrap:wrap;gap:3px}
.gap{font-size:10px;padding:1px 5px;border-radius:5px;white-space:nowrap;border:1px solid var(--line);color:var(--ink-mute)}
.gap.met{color:var(--green);border-color:var(--green)}
.gap.partial{color:var(--amber);border-color:var(--amber)}
.gap.missing{color:var(--red);border-color:transparent}
.gap.pending{color:var(--ink-mute);font-style:italic;border-style:dashed}
/* FTD strip (status footer) */
.ftd-strip{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-top:1px solid var(--line)}
@media(max-width:720px){.ftd-strip{grid-template-columns:1fr}}
.ftd-cell{background:var(--panel);padding:9px 18px}
.ftd-cell .hd{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;margin-bottom:4px}
.ftd-line{display:flex;align-items:baseline;gap:8px;font-size:12.5px;padding:1.5px 0}
.ftd-line .ix{color:var(--ink-dim);min-width:44px;font-weight:600}
.ftd-line .dt{font-family:var(--mono);color:var(--ink)}
.ftd-line .fst{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.ftd-line .fst.failed{color:var(--red)}.ftd-line .fst.active{color:var(--green)}.ftd-line .fst.expired{color:var(--neutral)}
.ftd-line .rsn{color:var(--ink-mute);font-size:11px}
.ftd-cur{font-size:14px;font-weight:640;font-family:var(--mono)}
.ftd-q{margin-top:6px;padding-top:7px;border-top:1px dashed var(--line)}
.ftd-q .qlab{font-size:11px;font-weight:700;letter-spacing:.05em}
.ftd-q .qrow{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-dim);padding:1px 0}.ftd-q .qrow .qv{font-family:var(--mono);color:var(--ink)}
/* MARKET BREADTH REALITY */
.reality{padding:0;overflow:hidden;position:relative}
.reality::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--rc,var(--red))}
.rl-top{padding:13px 18px 13px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.rl-state{display:flex;flex-direction:column;gap:2px}
.rl-state .st{font-size:17px;font-weight:720;letter-spacing:-.01em;color:var(--rc,var(--red))}
.rl-state .vd{font-size:12px;color:var(--ink-dim)}
.rl-chips{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.rl-chip{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:6px;color:var(--red);background:var(--red-bg);border:1px solid rgba(229,72,77,.3)}
.rl-body{display:grid;grid-template-columns:1.15fr 1fr 1fr;gap:1px;background:var(--line)}
@media(max-width:900px){.rl-body{grid-template-columns:1fr 1fr}}@media(max-width:560px){.rl-body{grid-template-columns:1fr}}
.rl-col{background:var(--panel);padding:12px 16px}
.rl-col .ct{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.rl-col .ct.sub{margin-top:12px;color:var(--ink-dim)}
.rl-col .ct-hint{font-size:10px;color:var(--ink-mute);margin:-4px 0 8px;line-height:1.4;letter-spacing:0;text-transform:none;font-weight:400}
.pair{margin-bottom:11px}.pair:last-child{margin-bottom:0}
.pair .pn{font-size:12px;font-weight:640;margin-bottom:3px}
.pair .pg{display:grid;grid-template-columns:auto auto auto;gap:2px 12px;font-size:11.5px;font-family:var(--mono)}
.pair .pg .k{color:var(--ink-mute);font-family:var(--sans)}.pair .pg .v{text-align:right;color:var(--ink)}
.pair .gap{margin-top:3px;font-size:11px;font-family:var(--mono)}
.pair .gap .badge2{font-size:9px;font-weight:700;letter-spacing:.04em;padding:1px 6px;border-radius:4px;margin-left:5px;text-transform:uppercase}
.badge2.narrow{color:var(--red);background:var(--red-bg)}.badge2.weak{color:var(--red);background:var(--red-bg)}
.badge2.improving{color:var(--amber);background:var(--amber-bg)}.badge2.broad{color:var(--green);background:var(--green-bg)}
.rl-mini{display:flex;flex-direction:column;gap:5px}
.rl-mini .m{display:flex;justify-content:space-between;font-size:11.5px;border-bottom:1px dashed var(--line);padding-bottom:4px}.rl-mini .m:last-child{border-bottom:0}
.rl-mini .m .mk{color:var(--ink-dim)}.rl-mini .m .mv{font-family:var(--mono);color:var(--ink);font-weight:600}
.perm{display:flex;flex-direction:column;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.perm .pt{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;margin-bottom:1px}
.perm .pr{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.perm .pr .pk{color:var(--ink-dim)}
.perm .pv{font-size:9.5px;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:5px;text-transform:uppercase}
.pv.allowed{color:var(--green);background:var(--green-bg)}.pv.selective{color:var(--amber);background:var(--amber-bg)}.pv.blocked{color:var(--red);background:var(--red-bg)}
.pv.observe{color:var(--ink-dim);background:var(--neutral-bg)}
.rl-note{padding:8px 18px 8px 22px;font-size:10.5px;color:var(--ink-mute);border-top:1px solid var(--line);line-height:1.55}
.rl-insights{padding:10px 18px 10px 22px;border-top:1px solid var(--line);background:rgba(255,255,255,.015)}
.rl-ins-hd{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;margin-bottom:6px}
.rl-ins{font-size:12px;line-height:1.6;color:var(--ink);padding:2px 0}

 const secFilter=_srt.length?`<div class="sfilter">`+_fchips.map(([k,lbl,c],i)=>
   `<button class="fchip${i===0?' on':''}" data-f="${k}" onclick="ccSecFilter(this,'${k}')">${esc(lbl)} <span class="fc">${c}</span></button>`).join('')+`</div>`:'';
 const chgBox=(SE.changes||[]).length?`<div class="chgbox"><span class="subhead">오늘의 변화</span>`+(SE.changes||[]).map(c=>`<span class="item"><span class="badge ${esc(c.dir)}">${c.dir==='in'?'회복':'이탈'}</span>${esc(c.name)}</span>`).join('')+`</div>`:'';
 const _rsLive=srows.some(r=>r.rs20!=null);
 const secNote=_rsLive?`${SE.total||0}개 업종 · STRONG→OK→AVOID · 동일 상태 RS20 내림차순`:`${SE.total||0}개 업종 · 20SMA 상태순 · RS20/1-Day 연결 대기`;
 const _legend=`<div id="secLegend" class="legend-box" style="display:none">`+
  `<div class="lg-h">상태 용어 설명</div>`+
  `<div class="lg-grid"><div><b>Primary (색)</b>`+
  `<div><span class="pill green">STRONG</span> 20SMA 위 + 강한 상대강도 · 주도 섹터</div>`+
  `<div><span class="pill accent">OK</span> 20SMA 위 · 중립~개선 · 참여 가능</div>`+
  `<div><span class="pill amber">WATCH</span> 혼조 · 관찰 필요</div>`+
  `<div><span class="pill red">AVOID</span> 20SMA 아래 또는 약세 · 신규 회피</div></div>`+
  `<div><b>Secondary (Stage)</b>`+
  `<div><b>LEADING+</b> RS 최상위 주도</div>`+
  `<div><b>RELATIVE SURVIVOR</b> 약세장서 상대적 생존(RS는 있으나 절대값은 약)</div>`+
  `<div><b>EARLY ROTATE</b> 초기 순환 진입 조짐</div>`+
  `<div><b>COOLING</b> 강세 후 둔화</div>`+
  `<div><b>LATE-CHASE</b> 상승 후반 · 추격 위험</div>`+
  `<div><b>WEAK</b> 약세</div></div></div></div>`;
 H.push(`<section><div class="sec-head"><span class="n">04</span><h2>Sector Rotation</h2>`+
  `<span class="help-ic" onclick="ccToggle('secLegend')" title="상태 용어 설명 보기">?</span>`+
  `<span class="note">${esc(secNote)}</span></div>${_legend}`+
  `<div class="card sect"><div class="sect-sum"><span class="pill green">Strong ${SE.strong??0} / ${SE.total??0}</span>`+
  `<span class="pill accent">Above 20SMA ${SE.above??0} / ${SE.total??0}</span><span class="pill red">Avoid ${SE.avoid??0} / ${SE.total??0}</span>`+
  `<span class="pill neutral rot">Rotation · ${esc(SE.rotation||'—')}</span></div>${secFilter}<div class="sect-scroll">${sBody}</div>${chgBox}</div></section>`);
 // 5 NEXT LEADERS — 3 zones
 const L=CC.next_leaders||{};
 // #7 후보 상태 구분: 0이 '스캔 완료 후 0'인지 '레지스트리 미연결(DATA_PENDING)'인지 명시.
 const _hasCand=(L.pipeline_rows&&L.pipeline_rows.length)||(L.current_rows&&L.current_rows.length)||(L.solo_rows&&L.solo_rows.length);
 const _plStatus=L.pipeline_status||(_hasCand?'COMPLETE_WITH_CANDIDATES':'NOT_RUN');
 // 레지스트리 미연결이면 카운트는 '0'이 아니라 '—'(0은 COMPLETE_EMPTY, 즉 실제 스캔 결과 0일 때만).
 const _pending=(!_hasCand)&&(_plStatus==='NOT_RUN'||_plStatus==='DATA_PENDING');
 const _cntTxt=c=>_pending?'—':c;
 const pipe=L.pipeline&&L.pipeline.length?L.pipeline:[['DISCOVERED',0],['SURVIVOR',0],['ANCHOR',0],['BUILDING',0],['CONTRACTING',0],['READY',0]];
 const readyN=L.ready??0;
 // §11 READY(기술적 준비) ↔ Market Permission(진입 허가) 분리 — 별개 축. Phase 0면 기술 READY라도 편입 차단.
 const _rsp=L.ready_split||{};
 const _tr=(_rsp.technical_ready!=null?_rsp.technical_ready:readyN), _ps=_rsp.permit_state;
 let readyTxt, _rtCls;
 if(_pending){readyTxt='READY — · REGISTRY PENDING';_rtCls='neutral';}
 else if(!_tr){readyTxt='READY 0 · 기술적 준비 후보 없음';_rtCls='neutral';}
 else if(_ps==='BLOCKED'){readyTxt=`TECHNICAL READY ${_tr} · 신규 위험 ${esc(_rsp.new_trade_cap||'0R')}로 편입 차단 (${_rsp.blocked_by_market!=null?_rsp.blocked_by_market:_tr})`;_rtCls='red';}
 else if(_ps==='PERMITTED'){readyTxt=`READY ${_tr} · 진입 허용 ${_rsp.entry_permitted!=null?_rsp.entry_permitted:_tr}${(L.ready_names&&L.ready_names.length)?' · '+esc(L.ready_names.join(' · ')):''}`;_rtCls='green';}
 else {readyTxt=`TECHNICAL READY ${_tr} · 시장 허가 데이터 대기`;_rtCls='amber';}
 // §2 주표기 = 현재 단계 분포(각 후보 1개 단계). 화살표 아닌 점(·) — '통과'로 오독 방지. 누적 퍼널은 보조 서브라인.
 const _distArr=(L.stage_dist&&L.stage_dist.length)?L.stage_dist:pipe;
 const pipeH=_distArr.map(([n,c],i)=>`<div class="st ${(!_pending&&c>0)?'filled':''}"><span class="name">${esc(n)}</span><span class="cnt">${esc(_cntTxt(c))}</span></div>`+(i<_distArr.length-1?'<span class="arw">·</span>':'')).join('')+`<span class="pill ${_rtCls} ready-tag">${esc(readyTxt)}</span>`;
 const _funArr=(L.pipeline||[]);
 const _funTxt=_funArr.length?('누적 도달(퍼널) — '+_funArr.map(([n,c])=>esc(n)+' '+esc(_cntTxt(c))).join(' ≥ ')):'';
 const _pipeCap=`<div class="pipe-cap"><b>현재 단계 분포</b> · CURRENT STAGE DISTRIBUTION · 각 후보 1개 단계에만 집계(화살표 아님)${_funTxt?`<br><span style="font-weight:400;text-transform:none;color:var(--ink-mute)">${_funTxt}</span>`:''}</div>`;
 const lhead=`<div class="lrow head"><div>종목</div><div>그룹</div><div>단계</div><div>근거</div><div>다음 조건</div></div>`;
 // §14 종목별 다음 단계 부족/충족 조건 — 아이콘 칩(✓충족·△진행·✕미충족·⋯데이터대기).
 const _GICO={MET:'✓',PARTIAL:'△',MISSING:'✕',PENDING:'⋯'};
 function gapsHtml(r){
   if(!r.gaps||!r.gaps.length) return esc(r.next||'');
   const head=r.target?`<div class="gap-tgt">다음 · ${esc(r.target)}</div>`:'';
   const items=r.gaps.map(g=>`<span class="gap ${(g.state||'').toLowerCase()}">${_GICO[g.state]||'·'} ${esc(g.label)}</span>`).join('');
   return head+`<div class="gap-list">${items}</div>`;
 }
 function zone(title,rows,colorFn){return rows&&rows.length?`<div class="zone-h">${title}</div><div class="lead">${lhead}`+rows.map(r=>{
   const permTag=r.perm?`<span class="pv ${PERMC[r.perm]||'blocked'}" style="margin-top:4px;font-size:8.5px">${r.size?esc(r.size)+' · ':''}${esc(r.perm)}</span>`:'';
   const _tkr=r.code?`<span class="tkr">${esc(r.code)}</span>`:'';
   return `<div class="lrow"><div class="tk">${esc(r.name)}${_tkr}</div><div class="gr">${esc(r.group)}</div>`+
   `<div style="display:flex;flex-direction:column;align-items:flex-start;gap:2px"><span class="pill ${colorFn(r)}">${esc(r.stage)}</span>${permTag}</div>`+
   `<div class="why">${esc(r.why)}</div><div class="nxt">${gapsHtml(r)}</div></div>`;}).join('')+`</div>`:'';}
 const pColor=r=>({DISCOVERED:'neutral',SURVIVOR:'neutral',ANCHOR:'accent',BUILDING:'amber',CONTRACTING:'amber',READY:'green'}[r.stage]||'neutral');
 const _plMsg={NOT_RUN:'DATA PENDING · Candidate Registry 연결 전',DATA_PENDING:'Candidate Registry 연결 대기',COMPLETE_EMPTY:'SCAN COMPLETE · 후보 0(실제 스캔 결과)',COMPLETE_WITH_CANDIDATES:''}[_plStatus]||'';
 const _plNote=_plStatus==='COMPLETE_WITH_CANDIDATES'?'추천 아님 · 발견→셋업 단계 추적':esc(_plMsg);
 const _plBanner=(!_hasCand&&_plMsg)?`<div style="padding:16px;color:var(--ink-mute);font-size:13px;text-align:center">${esc(_plMsg)}</div>`:'';
 H.push(`<section><div class="sec-head"><span class="n">05</span><h2>넥스트 리더 보드</h2><span class="note">${_plNote}</span></div>`+
  `<div class="card">${_pipeCap}<div class="pipe">${pipeH}</div>${_plBanner}`+
  zone('A · Next Leader Pipeline', L.pipeline_rows, pColor)+
  zone('B · Current / Selective Leaders', L.current_rows, ()=>'green')+
  zone('C · Solo Watch', L.solo_rows, ()=>'neutral')+`</div></section>`);
 // 06 STRATEGY DESK — 요약 카드(엔진 미배선이면 PENDING). Strategy Lab 링크.
 const ST=CC.strategy||{};
 const _stPend=(ST.status!=='LIVE');
 const _sc=ST.counts||{};
 const _stv=k=>(_sc[k]===null||_sc[k]===undefined)?'—':_sc[k];
 const stCells=[['오늘 집중','daily_focus'],['Coiled','coiled'],['Armed','armed'],['Triggered','triggered'],['Blocked','blocked'],['모델 보유','model_holdings'],['오늘 청산','today_exit']];
 const stGrid=stCells.map(([lab,k])=>`<div class="st-cell"><span class="st-cnt">${esc(_stv(k))}</span><span class="st-lab">${esc(lab)}</span></div>`).join('');
 const stChanges=(ST.changes&&ST.changes.length)?`<div class="st-chg">`+ST.changes.map(c=>`<div class="st-chg-r"><b>${esc(c.name||'')}</b> ${esc(c.note||'')}</div>`).join('')+`</div>`:'';
 const stBanner=_stPend?`<div class="st-pend">STRATEGY ENGINE PENDING · PBO Setup Engine 배선 전 — 카운트 미산출(0 아님)</div>`:'';
 const stNote=_stPend?'엔진 배선 전 · 요약만 표시':'DARREN PBO Continuation · 관찰용(추천 아님)';
 H.push(`<section><div class="sec-head"><span class="n">06</span><h2>Strategy Desk</h2><span class="note">${esc(stNote)}</span></div>`+
  `<div class="card st-card"><div class="st-grid">${stGrid}</div>${stBanner}${stChanges}`+
  `<a class="st-lab-link" href="${esc(ST.board_url||'setup_board.html')}">OPEN SETUP BOARD →</a>`+
  `<a class="st-lab-link" style="margin-left:16px" href="${esc(ST.lab_url||'#')}">OPEN STRATEGY LAB →</a>`+
  `<a class="st-lab-link" style="margin-left:16px" href="${esc(ST.ledger_url||'daily_signal_ledger_KR.html')}">OPEN SIGNAL LEDGER →</a></div></section>`);
 H.push(`<div class="foot"><b>이 대시보드는 매수 추천이 아닙니다.</b> 시장 상태·내부 구조·다음 리더 후보를 추적하는 관찰 자료입니다. READY도 매수 신호가 아니라 셋업 완성도 상태입니다.<br>${esc(CC.sources||'')}</div>`);
 app.innerHTML=H.join('');
}
render();
ccUpdateThemeBtn();
</script></body></html>
