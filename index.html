<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Darren Command Center · Subscriber Beta 오픈 준비 중</title>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:#0e1116;color:#e6edf3;padding:24px;word-break:keep-all;line-height:1.6}
  .card{max-width:560px;text-align:center}
  .brand{font-size:13px;letter-spacing:.18em;color:#8b98a5;text-transform:uppercase;margin-bottom:14px}
  h1{font-size:clamp(24px,5vw,34px);font-weight:800;margin:0 0 10px}
  .tag{color:#9aa7b4;font-size:14px;margin-bottom:22px}
  .msg{background:#161b22;border:1px solid #262d36;border-radius:14px;padding:20px 22px;font-size:15px}
  .msg b{color:#e6edf3}
  .sub{color:#aab4bf;font-size:12.5px;margin-top:22px}
  .badge{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#e8862e;
    border:1px solid #3a2a18;background:#1a130b;border-radius:999px;padding:5px 12px;margin-bottom:16px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e8862e;margin-right:7px;box-shadow:0 0 8px #e8862e}
  a{color:#58a6ff;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Darren Command Center</div>
    <div class="badge">Private Beta · Subscribers Only</div>
    <h1><span class="dot"></span>Subscriber Beta 오픈 준비 중</h1>
    <div class="tag">Market First. Leaders Next. Risk Always.</div>
    <div class="msg">
      구독자 전용 트레이딩 운영 플랫폼으로 <b>이전 작업이 진행 중</b>입니다.<br>
      곧 구독자 전용 로그인을 열고 베타 운영을 시작합니다.
    </div>
    <div class="sub">
      현재 이 준비 안내 페이지에서는 시장 데이터와 종목 정보를 제공하지 않습니다.<br>
      투자 관련 최종 판단과 책임은 언제나 이용자 본인에게 있습니다.
    </div>
  </div>
</body>
</html>
